name: Release Native Executables

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: mvn-arch.exe
            native-suffix: -runner.exe
          - os: macos-latest
            artifact: mvn-arch-macos
            native-suffix: -runner
          - os: ubuntu-latest
            artifact: mvn-arch-linux
            native-suffix: -runner

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup GraalVM (Mandrel)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'mandrel'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Visual Studio Dev Environment
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Make mvnw executable
        if: matrix.os != 'windows-latest'
        run: chmod +x ./mvnw

      - name: Build native executable
        run: ./mvnw clean package -Dnative -DskipTests

      - name: Rename executable (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: ren target\mvn-arch${{ matrix.native-suffix }} ${{ matrix.artifact }}

      - name: Rename executable (Unix)
        if: matrix.os != 'windows-latest'
        run: mv target/mvn-arch${{ matrix.native-suffix }} target/${{ matrix.artifact }}

      - name: Build MSI installer (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          dotnet tool install --global wix
          cp target/mvn-arch.exe wix/
          wix build wix/mvn-arch.wxs -d Version="${GITHUB_REF_NAME#v}" -o target/mvn-arch.msi
        shell: bash

      - name: Build deb package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p deb-pkg/usr/local/bin
          mkdir -p deb-pkg/DEBIAN
          cp target/mvn-arch-linux deb-pkg/usr/local/bin/mvn-arch
          chmod 755 deb-pkg/usr/local/bin/mvn-arch
          cat > deb-pkg/DEBIAN/control << EOF
          Package: mvn-arch
          Version: ${VERSION}
          Section: devel
          Priority: optional
          Architecture: amd64
          Maintainer: sosuisen
          Description: Wrapper CLI for mvn archetype:generate
          EOF
          dpkg-deb --build deb-pkg target/mvn-arch.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.artifact }}

      - name: Upload MSI
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v5
        with:
          name: mvn-arch.msi
          path: target/mvn-arch.msi

      - name: Upload deb
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v5
        with:
          name: mvn-arch.deb
          path: target/mvn-arch.deb

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/mvn-arch.msi/mvn-arch.msi
            artifacts/mvn-arch.deb/mvn-arch.deb
          generate_release_notes: true

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download macOS and Linux artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Compute SHA256
        id: sha
        run: |
          echo "macos=$(sha256sum artifacts/mvn-arch-macos/mvn-arch-macos | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux=$(sha256sum artifacts/mvn-arch-linux/mvn-arch-linux | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        uses: actions/checkout@v5
        with:
          repository: sosuisen/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Write formula
        run: |
          cat > homebrew-tap/Formula/mvn-arch.rb << 'FORMULA'
          class MvnArch < Formula
            desc "Wrapper CLI for mvn archetype:generate"
            homepage "https://github.com/sosuisen/mvn-arch"
            version "${{ steps.version.outputs.version }}"

            on_macos do
              url "https://github.com/sosuisen/mvn-arch/releases/download/v${{ steps.version.outputs.version }}/mvn-arch-macos"
              sha256 "${{ steps.sha.outputs.macos }}"
            end

            on_linux do
              url "https://github.com/sosuisen/mvn-arch/releases/download/v${{ steps.version.outputs.version }}/mvn-arch-linux"
              sha256 "${{ steps.sha.outputs.linux }}"
            end

            def install
              if OS.mac?
                bin.install "mvn-arch-macos" => "mvn-arch"
              else
                bin.install "mvn-arch-linux" => "mvn-arch"
              end
            end

            test do
              assert_match "mvn-arch", shell_output("#{bin}/mvn-arch --version")
            end
          end
          FORMULA

      - name: Commit and push formula
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mvn-arch.rb
          git commit -m "Update mvn-arch to ${{ steps.version.outputs.version }}"
          git push
